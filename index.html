<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f1efe8">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-title" content="inkwash">
<title>inkwash</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #f1efe8; }
  body { font-family: "Helvetica Neue", Helvetica, system-ui, sans-serif;
         -webkit-user-select: none; user-select: none;
         -webkit-touch-callout: none; overscroll-behavior: none;
         -webkit-tap-highlight-color: transparent; }
  canvas#c { position: fixed; inset: 0; width: 100%; height: 100%; cursor: none; touch-action: none; }

  #cursor { position: fixed; left: 0; top: 0; width: 10px; height: 10px;
            border: 1px solid rgba(38,38,48,.55); border-radius: 50%;
            pointer-events: none; z-index: 6; opacity: 0;
            transform: translate(-50%,-50%);
            transition: width .1s ease, height .1s ease, opacity .3s ease,
                        border-color .25s ease, box-shadow .25s ease; }
  #cursor.brush { border-color: rgba(70,80,120,.4);
                  box-shadow: 0 0 14px rgba(70,80,120,.18) inset, 0 0 10px rgba(70,80,120,.12); }
  #cursor.white { border-color: rgba(255,255,255,.9);
                  box-shadow: 0 0 0 1px rgba(38,38,48,.35); }

  #hint { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
          font-size: 10px; letter-spacing: .45em; text-transform: uppercase;
          color: rgba(38,38,48,.32); pointer-events: none; z-index: 5;
          transition: opacity 1.4s ease; padding-left: .45em; text-align: center; line-height: 2.2; }
  #hint.gone { opacity: 0; }

  #ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        display: flex; flex-wrap: wrap; justify-content: center; gap: 16px 26px;
        align-items: flex-end; max-width: 94vw; z-index: 7;
        opacity: 0; pointer-events: none; transition: opacity .6s ease; }
  #ui.show { opacity: 1; pointer-events: auto; }
  #ui .ctl.adv { display: none; }
  #ui.open .ctl.adv { display: flex; }
  .ctl { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .ctl label { font-size: 8.5px; letter-spacing: .32em; text-transform: uppercase;
               color: rgba(38,38,48,.45); padding-left: .32em; white-space: nowrap; }
  input[type=range] { -webkit-appearance: none; appearance: none;
                      width: 76px; height: 16px; background: transparent; margin: 0; cursor: pointer; }
  input[type=range]::-webkit-slider-runnable-track { height: 1px; background: rgba(38,38,48,.28); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
      width: 9px; height: 9px; border-radius: 50%; background: #f1efe8;
      border: 1px solid rgba(38,38,48,.65); margin-top: -4.5px; }
  input[type=range]::-moz-range-track { height: 1px; background: rgba(38,38,48,.28); }
  input[type=range]::-moz-range-thumb { width: 8px; height: 8px; border-radius: 50%;
      background: #f1efe8; border: 1px solid rgba(38,38,48,.65); }
  #ui button { background: none; border: none; cursor: pointer; padding: 0 0 1px 0;
       font-size: 8.5px; letter-spacing: .32em; text-transform: uppercase;
       color: rgba(38,38,48,.45); font-family: inherit; border-bottom: 1px solid transparent; }
  #ui button:hover { color: rgba(38,38,48,.85); border-bottom-color: rgba(38,38,48,.4); }
  #ui button.mode { color: rgba(38,38,48,.7); min-width: 52px; }
  #ui button.menu-toggle { color: rgba(38,38,48,.5); }
  input[type=color] { -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
       padding: 0; border: 1px solid rgba(38,38,48,.45); border-radius: 50%;
       background: none; cursor: pointer; }
  input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type=color]::-webkit-color-swatch { border: none; border-radius: 50%; }
  body.touch input[type=color] { width: 22px; height: 22px; }
  /* ink swatch palette */
  .swatches { display: flex; gap: 7px; align-items: center; height: 16px; }
  .swatch { width: 14px; height: 14px; border-radius: 50%; padding: 0; cursor: pointer;
            border: 1px solid rgba(38,38,48,.3); background: none; }
  .swatch.swatch-white { background: #fff; }
  .swatch.active { box-shadow: 0 0 0 2px #f1efe8, 0 0 0 3.5px rgba(38,38,48,.6); }
  body.touch .swatch { width: 20px; height: 20px; }
  body.touch .swatches { gap: 10px; height: auto; }
  .err { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
         font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: rgba(38,38,48,.5); }

  /* gallery modal */
  #gallery { position: fixed; inset: 0; z-index: 20; background: rgba(241,239,232,.97);
             -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
             display: flex; flex-direction: column; opacity: 0; pointer-events: none;
             transition: opacity .25s ease; }
  #gallery.open { opacity: 1; pointer-events: auto; }
  #gallery-header { display: flex; align-items: center; gap: 16px;
                    padding: max(20px, calc(env(safe-area-inset-top) + 10px)) 24px 14px;
                    border-bottom: 1px solid rgba(38,38,48,.12); flex-shrink: 0; }
  #gallery-header h2 { margin: 0; font: 300 13px/1 'Helvetica Neue', Helvetica, sans-serif;
                       letter-spacing: .38em; text-transform: uppercase; color: rgba(38,38,48,.7);
                       flex: 1; }
  #gallery-header button { background: none; border: none; cursor: pointer; padding: 0;
                            font: 9px/1 'Helvetica Neue', Helvetica, sans-serif;
                            letter-spacing: .32em; text-transform: uppercase; color: rgba(38,38,48,.5);
                            font-family: inherit; border-bottom: 1px solid transparent; }
  #gallery-header button:hover { color: rgba(38,38,48,.9); border-bottom-color: rgba(38,38,48,.35); }
  #bGalClose { font-size: 18px; letter-spacing: 0; color: rgba(38,38,48,.4); line-height: 1;
               padding: 4px; border-bottom: none !important; }
  #gallery-grid { flex: 1; overflow-y: auto; padding: 24px;
                  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;
                  align-content: start; }
  #gallery-empty { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
                   font: 9.5px/2 'Helvetica Neue', Helvetica, sans-serif;
                   letter-spacing: .38em; text-transform: uppercase; color: rgba(38,38,48,.3);
                   text-align: center; pointer-events: none; }
  .gal-card { display: flex; flex-direction: column; gap: 8px; }
  .gal-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 3px;
                  border: 1px solid rgba(38,38,48,.12); display: block; }
  .gal-card-foot { display: flex; align-items: center; gap: 8px; }
  .gal-card-date { flex: 1; font: 9px/1 'Helvetica Neue', Helvetica, sans-serif;
                   letter-spacing: .24em; text-transform: uppercase; color: rgba(38,38,48,.38); }
  .gal-card-foot button { background: none; border: none; cursor: pointer; padding: 2px 4px;
                           font: 9px/1 'Helvetica Neue', Helvetica, sans-serif;
                           letter-spacing: .24em; text-transform: uppercase; color: rgba(38,38,48,.42);
                           font-family: inherit; border-bottom: 1px solid transparent; }
  .gal-card-foot button:hover { color: rgba(38,38,48,.85); border-bottom-color: rgba(38,38,48,.3); }
  .gal-saving { opacity: .5; pointer-events: none; }
  @media (max-width: 600px) {
    #gallery-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); padding: 14px; gap: 12px; }
    #gallery-header { padding: 14px 16px 10px; }
  }

  /* first-run onboarding */
  #onboard { position: fixed; inset: 0; z-index: 30; display: flex;
             align-items: center; justify-content: center; padding: 24px;
             background: rgba(241,239,232,.98);
             -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
             opacity: 0; transition: opacity .4s ease; }
  #onboard.show { opacity: 1; }
  #onboard-card { max-width: 360px; width: 100%; text-align: center; }
  #onboard-card h1 { margin: 0; font: 300 26px/1 'Helvetica Neue', Helvetica, sans-serif;
                     letter-spacing: .42em; text-transform: uppercase; color: rgba(38,38,48,.82);
                     padding-left: .42em; }
  #onboard-card .onboard-sub { margin: 12px 0 28px; font-size: 9.5px; letter-spacing: .34em;
                     text-transform: uppercase; color: rgba(38,38,48,.4); }
  #onboard-card dl { display: grid; grid-template-columns: auto 1fr; gap: 12px 16px;
                     margin: 0 0 28px; text-align: left; }
  #onboard-card dt { font-size: 8.5px; letter-spacing: .3em; text-transform: uppercase;
                     color: rgba(38,38,48,.75); white-space: nowrap; padding-top: 2px; }
  #onboard-card dd { margin: 0; font-size: 11px; line-height: 1.5; color: rgba(38,38,48,.55); }
  #onboard-go { background: none; cursor: pointer; font-family: inherit;
                font-size: 10px; letter-spacing: .34em; text-transform: uppercase;
                color: rgba(38,38,48,.6); padding: 10px 28px;
                border: 1px solid rgba(38,38,48,.3); border-radius: 22px; }
  #onboard-go:hover { color: rgba(38,38,48,.9); border-color: rgba(38,38,48,.55); }

  /* touch devices: controls always visible, finger-sized, above the home indicator */
  body.touch #ui {
        flex-wrap: wrap; justify-content: center; align-items: flex-end;
        gap: 10px 20px; max-width: 94vw; padding: 10px 16px; border-radius: 16px;
        background: rgba(241,239,232,.6);
        -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
        bottom: calc(10px + env(safe-area-inset-bottom)); }
  body.touch input[type=range] { width: 70px; height: 28px; }
  body.touch input[type=range]::-webkit-slider-thumb { width: 15px; height: 15px; margin-top: -7px; }
  body.touch #ui button { font-size: 10.5px; padding: 8px 4px 5px; }
  body.touch .ctl { gap: 4px; }

  @media (max-width: 600px) {
    #ui {
      left: auto; right: calc(10px + env(safe-area-inset-right));
      transform: none; max-width: calc(100vw - 20px - env(safe-area-inset-left) - env(safe-area-inset-right));
      width: auto; justify-content: flex-end; align-items: flex-end;
      flex-wrap: wrap; gap: 8px; padding: 8px; border-radius: 14px;
    }
    /* essentials stay in the pill; .adv controls reveal via "more" (global rule) */
    #ui.open { width: min(312px, calc(100vw - 20px - env(safe-area-inset-left) - env(safe-area-inset-right))); }
    #ui.open .ctl {
      flex: 0 0 70px; min-height: 43px;
      justify-content: flex-end;
    }
    #ui.open .ctl.mode-ctl { order: -2; }
    #ui button {
      min-width: 38px; min-height: 38px;
      padding: 0; border: 1px solid rgba(38,38,48,.28);
      border-radius: 50%; background: rgba(241,239,232,.72);
      -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    }
    #ui.open button:not(.mode):not(.menu-toggle) {
      min-width: 0; min-height: 0;
      padding: 8px 4px 5px;
      border: none; border-radius: 0; background: none;
      -webkit-backdrop-filter: none; backdrop-filter: none;
    }
    #ui button.menu-toggle {
      align-items: center; justify-content: center;
      font-size: 8px; letter-spacing: .12em;
    }
    #ui.open button.menu-toggle { order: 99; }
    #ui .ctl.mode-ctl label { display: none; }
    #ui .ctl.mode-ctl button.mode {
      position: relative; min-width: 38px; color: transparent;
      font-size: 0; letter-spacing: 0;
    }
    #ui .ctl.mode-ctl button.mode::before,
    #ui .ctl.mode-ctl button.mode::after {
      content: ""; position: absolute; left: 50%; top: 50%;
      background: rgba(38,38,48,.68); pointer-events: none;
    }
    #ui .ctl.mode-ctl button.mode.mode-pen::before {
      width: 20px; height: 2px; border-radius: 2px;
      transform: translate(-50%, -50%) rotate(-42deg);
    }
    #ui .ctl.mode-ctl button.mode.mode-pen::after {
      width: 5px; height: 5px; border-radius: 50%;
      transform: translate(4px, -10px);
    }
    #ui .ctl.mode-ctl button.mode.mode-brush::before {
      width: 8px; height: 19px; border-radius: 8px 8px 3px 3px;
      transform: translate(-50%, -50%) rotate(28deg);
    }
    #ui .ctl.mode-ctl button.mode.mode-brush::after {
      width: 16px; height: 2px; border-radius: 2px;
      transform: translate(-50%, 7px) rotate(28deg);
    }
    #ui .ctl.mode-ctl button.mode.mode-fude::before {
      width: 22px; height: 6px; border-radius: 80% 18% 18% 80%;
      transform: translate(-50%, -50%) rotate(28deg);
    }
    #ui .ctl.mode-ctl button.mode.mode-fude::after {
      width: 7px; height: 7px; border-radius: 50%;
      transform: translate(5px, -8px);
    }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="cursor"></div>
<div id="hint">pen<br>hold pen button for water · tap mode for fude calligraphy</div>
<div id="ui">
  <!-- essentials: always at hand -->
  <div class="ctl mode-ctl"><label>mode</label><button id="bMode" class="mode mode-pen" aria-label="Mode: pen">pen</button></div>
  <div class="ctl"><label>size</label><input id="sSize" type="range" min="0" max="1" step="0.01" value="0.5"></div>
  <div class="ctl"><button id="bClear">clear</button></div>
  <div class="ctl"><button id="bGallery">gallery</button></div>
  <button id="bMenu" class="menu-toggle" aria-label="More controls" aria-expanded="false">more</button>
  <!-- advanced: revealed by "more" -->
  <div class="ctl adv"><label>ink</label><div id="swatches" class="swatches" role="group" aria-label="Ink colour"></div></div>
  <div class="ctl adv"><label>flow</label><input id="sFlow" type="range" min="0" max="1" step="0.01" value="0.6"></div>
  <div class="ctl adv"><label>bleed</label><input id="sBleed" type="range" min="0" max="1" step="0.01" value="0.5"></div>
  <div class="ctl adv"><label>dry</label><input id="sDry" type="range" min="0" max="1" step="0.01" value="0.45"></div>
  <div class="ctl adv"><label>color</label><input id="sColor" type="range" min="0" max="1" step="0.01" value="0.5"></div>
  <div class="ctl adv"><label>brush ink</label><input id="sBink" type="range" min="0" max="1" step="0.01" value="0"></div>
  <div class="ctl adv"><button id="bFix">fix</button></div>
  <div class="ctl adv"><button id="bSave">save</button></div>
</div>

<div id="gallery">
  <div id="gallery-header">
    <h2>saved paintings</h2>
    <button id="bGalSave">save current</button>
    <button id="bGalClose" aria-label="Close gallery">&#x2715;</button>
  </div>
  <div id="gallery-grid">
    <div id="gallery-empty">no saved paintings yet</div>
  </div>
</div>

<script type="module" src="js/main.js"></script>

<script>
// Service worker powers the offline PWA on the web. Inside the Capacitor
// native shell the assets are already local, so registration is skipped.
if ('serviceWorker' in navigator &&
    !(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform())){
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
</body>
</html>
