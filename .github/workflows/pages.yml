name: Deploy web (PWA) to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# allow this workflow to publish a Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# one concurrent Pages deploy; newer pushes cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # copy-www.mjs uses only Node built-ins, so no npm install is needed.
      # www/ ends up containing exactly the deployable static web app.
      - name: Assemble static site
        run: node scripts/copy-www.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: www

      - id: deploy
        uses: actions/deploy-pages@v4
