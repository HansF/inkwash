name: Release Android (signed APK)

# Triggered by a version tag (e.g. v1.0.0) or manually. Produces a signed
# release APK and, on a tag, attaches it to a GitHub Release.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64   base64 of your release keystore (.jks/.keystore)
#                             generate with: base64 -w0 release.keystore
#   ANDROID_KEYSTORE_PASSWORD store password
#   ANDROID_KEY_ALIAS         key alias
#   ANDROID_KEY_PASSWORD      key password

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release on a tag

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Assemble www/ and add the Android platform
        run: |
          npm run build:www
          npx cap add android
          npx cap sync android

      - name: Build release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign release APK
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '34.0.0'

      - name: Rename signed APK
        run: cp "${{ steps.sign.outputs.signedReleaseFile }}" inkwash-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: inkwash-release-apk
          path: inkwash-release.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: inkwash-release.apk
